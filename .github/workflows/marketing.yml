name: SmartLivingCircle Marketing Engine

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  marketing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests PyJWT cryptography

      - name: Run Binance Monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CRYPTO_WALLET: ${{ secrets.CRYPTO_WALLET }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python binance_monitor.py
        continue-on-error: true

      - name: Run Traffic Growth Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CRYPTO_WALLET: ${{ secrets.CRYPTO_WALLET }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
        run: python traffic_growth.py
        continue-on-error: true

      - name: Run Discord Campaign
        run: python -c "import sys; sys.path.insert(0,'.'); from discord_poster import run_discord_campaign; run_discord_campaign()"
        continue-on-error: true

      - name: Run Telegram Campaign
        run: python telegram_poster.py
        continue-on-error: true

      - name: Run Crypto Earner
        run: python crypto_earner.py
        continue-on-error: true

      - name: Auto-deliver Payhip orders
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python payhip_auto_delivery.py
        continue-on-error: true